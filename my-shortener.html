<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Link Shortener</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white p-5">
    <div class="max-w-2xl mx-auto mt-10">
        <div class="bg-gray-800 p-8 rounded-2xl shadow-xl border border-gray-700">
            <h1 class="text-3xl font-bold mb-6 text-blue-400">GitHub x Google Sheets</h1>
            
            <div class="space-y-4">
                <input type="url" id="longUrl" placeholder="วางลิงก์ยาวที่นี่" 
                    class="w-full p-3 rounded bg-gray-700 border border-gray-600 focus:outline-none focus:border-blue-500">
                
                <input type="text" id="customId" placeholder="ชื่อลิงก์ (ถ้ามี)" 
                    class="w-full p-3 rounded bg-gray-700 border border-gray-600 focus:outline-none focus:border-blue-500">
                
                <button onclick="shorten()" id="btn" class="w-full bg-blue-600 p-3 rounded font-bold hover:bg-blue-700">
                    สร้างลิงก์และบันทึก
                </button>
            </div>

            <div id="result" class="mt-6 p-4 bg-gray-900 rounded hidden">
                <p class="text-sm text-gray-400">ลิงก์ของคุณ:</p>
                <p id="shortLink" class="text-blue-300 font-mono"></p>
            </div>
        </div>

        <div class="mt-10 bg-gray-800 rounded-2xl overflow-hidden shadow-xl">
            <div class="p-4 bg-gray-700 font-bold">สถิติจาก Google Sheets</div>
            <table class="w-full text-left">
                <thead>
                    <tr class="text-gray-400 border-b border-gray-700">
                        <th class="p-4">ID</th>
                        <th class="p-4">คลิก</th>
                    </tr>
                </thead>
                <tbody id="statTable"></tbody>
            </table>
        </div>
    </div>

    <script>
        // *** สำคัญ: วาง Web App URL ของ Google Script ที่นี่ ***
        const SCRIPT_URL = "YOUR_GOOGLE_SCRIPT_WEB_APP_URL";

        async function shorten() {
            const url = document.getElementById('longUrl').value;
            const id = document.getElementById('customId').value;
            const btn = document.getElementById('btn');

            if(!url) return alert("ใส่ลิงก์ก่อนครับ");

            btn.innerText = "กำลังสื่อสารกับ Google Sheets...";
            
            // เรียกใช้ Google Script
            fetch(`${SCRIPT_URL}?longUrl=${encodeURIComponent(url)}&customId=${id}`)
                .then(res => res.json())
                .then(data => {
                    document.getElementById('result').classList.remove('hidden');
                    document.getElementById('shortLink').innerText = data.shortUrl;
                    btn.innerText = "สร้างลิงก์และบันทึก";
                    loadStats();
                });
        }

        async function loadStats() {
            const res = await fetch(`${SCRIPT_URL}?action=getStats`);
            const data = await res.json();
            let html = '';
            data.forEach(row => {
                html += `<tr class="border-b border-gray-700">
                    <td class="p-4 font-mono text-blue-300">${row[0]}</td>
                    <td class="p-4">${row[2]} ครั้ง</td>
                </tr>`;
            });
            document.getElementById('statTable').innerHTML = html;
        }

        window.onload = loadStats;
    </script>
</body>
</html>
