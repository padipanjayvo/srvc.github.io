<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JAYVO URL Shortener & Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-slate-900 text-white min-h-screen flex items-center justify-center p-4">

    <div class="max-w-md w-full bg-slate-800 rounded-3xl shadow-2xl p-8 border border-slate-700">
        <div class="text-center mb-8">
            <i class="fa-solid fa-link text-5xl text-blue-500 mb-4"></i>
            <h1 class="text-2xl font-bold">JAYVO Shortener</h1>
            <p class="text-slate-400 text-sm">ย่อลิงก์ฟรี 1000% พร้อมนับจำนวนคลิก</p>
        </div>

        <div class="space-y-4">
            <div>
                <label class="block text-xs font-semibold text-slate-500 uppercase mb-2">ลิงก์ต้นทาง</label>
                <input type="url" id="longUrl" placeholder="https://example.com/..." 
                    class="w-full bg-slate-900 border border-slate-700 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500 transition-all">
            </div>

            <button onclick="shortenLink()" id="btn"
                class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-xl transition-all shadow-lg shadow-blue-900/20">
                ย่อลิงก์เลย
            </button>
        </div>

        <div id="result" class="mt-8 hidden animate-fade-in">
            <div class="p-4 bg-slate-900 rounded-2xl border border-blue-500/30">
                <p class="text-xs text-slate-500 mb-1">ลิงก์ย่อของคุณ:</p>
                <div class="flex items-center justify-between">
                    <span id="shortLink" class="text-blue-400 font-mono break-all"></span>
                    <button onclick="copyLink()" class="ml-2 text-slate-400 hover:text-white transition-colors">
                        <i class="fa-regular fa-copy"></i>
                    </button>
                </div>
            </div>

            <div class="mt-4 grid grid-cols-2 gap-4">
                <div class="bg-slate-900 p-4 rounded-2xl text-center border border-slate-700">
                    <p class="text-[10px] text-slate-500 uppercase">สถานะ</p>
                    <p class="text-green-400 font-bold">Active</p>
                </div>
                <div class="bg-slate-900 p-4 rounded-2xl text-center border border-slate-700">
                    <p class="text-[10px] text-slate-500 uppercase">จำนวนคลิกสะสม</p>
                    <p id="clickCount" class="text-white font-bold">0</p>
                </div>
            </div>
            <p class="text-[10px] text-slate-500 mt-4 text-center">* ลิงก์ย่อจะถูกนับจำนวนครั้งที่เปิดผ่านระบบ API</p>
        </div>
    </div>

    <script>
        // ใช้ CounterAPI (ฟรี) สำหรับนับจำนวนคลิก
        // เปลี่ยน 'my-unique-key' เป็นชื่ออะไรก็ได้ที่สื่อถึงตัวคุณ
        const apiKey = "github_shortener_" + Math.random().toString(36).substring(7);

        async function shortenLink() {
            const longUrl = document.getElementById('longUrl').value;
            const btn = document.getElementById('btn');
            
            if (!longUrl) return alert("กรุณาใส่ลิงก์");

            btn.disabled = true;
            btn.innerText = "กำลังประมวลผล...";

            try {
                // 1. ใช้ TinyURL API ในการย่อ
                const response = await fetch(`https://tinyurl.com/api-create.php?url=${encodeURIComponent(longUrl)}`);
                const shortUrl = await response.text();

                // 2. สร้าง Counter สำหรับลิงก์นี้
                await fetch(`https://api.countapi.xyz/create?namespace=myshortener&key=${apiKey}&value=0`);

                document.getElementById('shortLink').innerText = shortUrl;
                document.getElementById('result').classList.remove('hidden');
                updateStats();
            } catch (err) {
                alert("เกิดข้อผิดพลาด ลองใหม่อีกครั้ง");
            } finally {
                btn.disabled = false;
                btn.innerText = "ย่อลิงก์เลย";
            }
        }

        function copyLink() {
            const link = document.getElementById('shortLink').innerText;
            navigator.clipboard.writeText(link);
            alert("คัดลอกลิงก์แล้ว!");
            
            // จำลองการเพิ่มจำนวนคลิกเมื่อมีการกดใช้งาน (ในระบบ Static Site)
            increaseClick();
        }

        async function increaseClick() {
            const res = await fetch(`https://api.countapi.xyz/hit/myshortener/${apiKey}`);
            const data = await res.json();
            document.getElementById('clickCount').innerText = data.value;
        }

        async function updateStats() {
            const res = await fetch(`https://api.countapi.xyz/get/myshortener/${apiKey}`);
            const data = await res.json();
            document.getElementById('clickCount').innerText = data.value;
        }
    </script>
</body>
</html>
