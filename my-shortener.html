<!DOCTYPE html>
<html>
<head>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background: #f4f7f6; padding-top: 50px; font-family: 'Sarabun', sans-serif; }
    .card { border-radius: 15px; border: none; shadow: 0 4px 6px rgba(0,0,0,0.1); }
    .btn-primary { background: #4285f4; border: none; }
  </style>
</head>
<body>
  <div class="container mt-5">
    <div class="row justify-content-center">
      <div class="col-md-8">
        <div class="card p-4 shadow-sm">
          <h2 class="text-center mb-4">🚀 ย่อลิงก์ด้วย Google Script</h2>
          
          <div class="mb-3">
            <input type="url" id="longUrl" class="form-control" placeholder="วางลิงก์ยาวๆ ที่นี่...">
          </div>
          <div class="mb-3">
            <input type="text" id="customId" class="form-control" placeholder="ชื่อที่ต้องการ (เว้นว่างไว้เพื่อสุ่ม)">
          </div>
          <button onclick="makeShort()" class="btn btn-primary w-100 py-2" id="btn">สร้างลิงก์ย่อ</button>

          <div id="result" class="mt-4 text-center" style="display:none;">
            <p>ลิงก์ของคุณคือ:</p>
            <h4 id="shortenedLink" class="text-primary"></h4>
          </div>
        </div>

        <div class="mt-5">
          <h4>📊 สถิติการใช้งาน</h4>
          <table class="table table-hover bg-white rounded shadow-sm">
            <thead>
              <tr>
                <th>รหัส</th>
                <th>ปลายทาง</th>
                <th>คลิก</th>
              </tr>
            </thead>
            <tbody id="statTable"></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <script>
    function makeShort() {
      const url = document.getElementById('longUrl').value;
      const id = document.getElementById('customId').value;
      const btn = document.getElementById('btn');
      
      if(!url) return alert('กรุณาใส่ URL');
      
      btn.disabled = true;
      btn.innerHTML = 'กำลังสร้าง...';

      google.script.run.withSuccessHandler(function(res) {
        document.getElementById('result').style.display = 'block';
        document.getElementById('shortenedLink').innerText = res;
        btn.disabled = false;
        btn.innerHTML = 'สร้างลิงก์ย่อ';
        loadStats(); // อัปเดตตาราง
      }).shortenUrl(url, id);
    }

    function loadStats() {
      google.script.run.withSuccessHandler(function(data) {
        let html = '';
        data.forEach(row => {
          html += `<tr>
            <td><strong>${row[0]}</strong></td>
            <td class="text-truncate" style="max-width: 200px;">${row[1]}</td>
            <td><span class="badge bg-success">${row[2]}</span></td>
          </tr>`;
        });
        document.getElementById('statTable').innerHTML = html;
      }).getStats();
    }

    // โหลดสถิติเมื่อเปิดหน้าเว็บ
    window.onload = loadStats;
  </script>
</body>
</html>
